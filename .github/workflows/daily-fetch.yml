name: Daily News Fetch

on:
  schedule:
    - cron: '0 23 * * *'  # 每天 UTC 23:00 (北京时间次日 7:00) 运行
  workflow_dispatch:      # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data fetch
        run: node scripts/fetch-all-v2.js
        env:
          # 如果需要股票数据，配置 Longbridge API
          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update daily report $(date +%Y-%m-%d)"
          git push
